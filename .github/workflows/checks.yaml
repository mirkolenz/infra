name: checks
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# keep job names in sync: https://github.com/mirkolenz/infra/settings/rules/3352950
jobs:
  check-eval:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3
        with:
          extra-conf: |
            accept-flake-config = true
            cores = 0
            eval-cores = 1
            log-lines = 200
            max-jobs = 1
      # small eval store: cache /nix and the eval cache
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-eval-x86_64-linux-${{ hashFiles('flake.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-eval-x86_64-linux-
          paths: |
            /nix
            ~/.cache/nix
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mirkolenz
          authToken: ${{ secrets.CACHIX_TOKEN }}
      - run: nix flake check --no-build --show-trace
      - run: nix fmt -- --ci
  check-systems:
    name: check-${{ matrix.system }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # https://docs.github.com/en/actions/reference/runners/github-hosted-runners
          - system: aarch64-linux
            runner: ubuntu-26.04-arm
          - system: x86_64-linux
            runner: ubuntu-26.04
          - system: aarch64-darwin
            runner: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3
        with:
          extra-conf: |
            accept-flake-config = true
            build-dir = /nix/build
            cores = 0
            eval-cores = 1
            fallback = true
            keep-going = true
            log-lines = 200
            max-jobs = 1
      # closure exceeds the 10 GB cache limit: cache only the eval cache, not /nix
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          nix: false
          primary-key: nix-build-${{ matrix.system }}-${{ hashFiles('flake.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-build-${{ matrix.system }}-
          paths: ~/.cache/nix
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mirkolenz
          authToken: ${{ secrets.CACHIX_TOKEN }}
      - run: nix run . -- build-pkgs --show-trace
