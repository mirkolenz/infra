name: checks
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# keep job names in sync: https://github.com/mirkolenz/infra/settings/rules/3352950
jobs:
  gate:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          run=true
          if [[ "$EVENT" == push ]]; then
            count=$(gh api "repos/$REPO/commits/$SHA/pulls" --jq length || echo 0)
            if [[ "$count" -gt 0 ]]; then
              run=false
            fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
  check-systems:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    name: check-${{ matrix.system }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # https://docs.github.com/en/actions/reference/runners/github-hosted-runners
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
          - system: x86_64-linux
            runner: ubuntu-24.04
          - system: aarch64-darwin
            runner: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10
        if: runner.os == 'Linux'
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3
        with:
          extra-conf: |
            accept-flake-config = true
            keep-going = true
            download-buffer-size = 1000000000
            log-lines = 200
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mirkolenz
          authToken: ${{ secrets.CACHIX_TOKEN }}
      - run: nix flake check --show-trace
  check-all:
    needs: [gate, check-systems]
    runs-on: ubuntu-slim
    if: always() && needs.gate.outputs.run == 'true'
    steps:
      - name: Check matrix results
        run: |
          result="${{ needs.check-systems.result }}"
          if [[ $result == "success" ]]; then
            exit 0
          else
            exit 1
          fi
