name: update
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  # Refresh the lockfile after every merge to main. Using push (not
  # pull_request_target) keeps this safe: it only ever runs already-merged,
  # trusted commits on main and never exposes secrets to fork PR code. The
  # update-deps PR below is auto-merged with GITHUB_TOKEN, and GITHUB_TOKEN
  # merges do not trigger workflows, so this never loops on its own updates.
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          # TODO: switch to `client-id` once actionlint's bundled action schema includes it
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}
          # homeserver scope is needed for the dispatch step below
          owner: ${{ github.repository_owner }}
          repositories: |
            infra
            homeserver
      - uses: actions/checkout@v6
      - uses: fregante/setup-git-user@v2
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
            download-buffer-size = 1000000000
            log-lines = 200
            commit-lock-file-summary = chore(deps/nix): update
      - run: nix run . -- update-all --commit
        env:
          GH_TOKEN: ${{ github.token }}
      - name: remove unstaged changes
        run: git restore .
      - uses: peter-evans/create-pull-request@v8
        id: pr
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: update-deps
          delete-branch: true
          title: "chore(deps): auto-update"
          body: "Automated changes by the update workflow."
      - name: automerge
        run: gh pr merge --auto --rebase ${{ steps.pr.outputs.pull-request-number }}
        if: steps.pr.outputs.pull-request-number != ''
        env:
          # GITHUB_TOKEN merges intentionally do not trigger the push trigger above,
          # so this job never re-runs on its own update-deps merge.
          GH_TOKEN: ${{ github.token }}
      # As the single source of truth, tell homeserver to refresh its infra pin
      # whenever infra's main advances (renovate / manual merges trigger this run).
      - name: notify homeserver
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: gh api repos/${{ github.repository_owner }}/homeserver/dispatches -f event_type=infra-updated
